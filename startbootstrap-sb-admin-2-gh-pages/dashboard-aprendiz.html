<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com/css?family=Nunito:200,300,400,600,700,800,900" rel="stylesheet">
  <link href="css/sb-admin-2.min.css" rel="stylesheet">
  <link href="css/sena-learn.css" rel="stylesheet">
</head>
<body id="page-top">
  <div id="wrapper">
    <ul class="navbar-nav bg-gradient-sena sidebar sidebar-dark accordion" id="accordionSidebar">
      <a class="sidebar-brand d-flex align-items-center justify-content-center" href="dashboard-aprendiz.html">
        <div class="sidebar-brand-icon">
          <i class="fas fa-user-graduate"></i>
        </div>
        <div class="sidebar-brand-text mx-3">SENALearn</div>
      </a>
      <hr class="sidebar-divider my-0">
      <li class="nav-item active">
        <a class="nav-link" href="dashboard-aprendiz.html">
          <i class="fas fa-fw fa-tachometer-alt"></i>
          <span>Panel principal</span>
        </a>
      </li>
      <hr class="sidebar-divider">
      <div class="sidebar-heading">Aprendizaje</div>
      <li class="nav-item">
        <a class="nav-link" href="#">
          <i class="fas fa-fw fa-project-diagram"></i>
          <span>Mi proyecto</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">
          <i class="fas fa-fw fa-file-alt"></i>
          <span>Evidencias</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link logout-link" href="login.html" data-action="logout">
          <i class="fas fa-fw fa-sign-out-alt"></i>
          <span>Cerrar sesion</span>
        </a>
      </li>
    </ul>
    <div id="content-wrapper" class="d-flex flex-column">
      <div id="content">
        <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
          <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
            <i class="fa fa-bars"></i>
          </button>
          <div class="mr-auto">
            <span class="sena-role-pill" data-session-role></span>
          </div>
          <ul class="navbar-nav ml-auto">
            <li class="nav-item no-arrow">
              <span class="nav-link text-gray-700">
                <span class="mr-2 d-none d-lg-inline" data-session-name></span>
                <i class="fas fa-user-circle fa-lg"></i>
              </span>
            </li>
          </ul>
        </nav>
        <div class="container-fluid">
          <div class="card shadow mb-4 border-0 sena-highlight dashboard-hero">
            <div class="card-body p-4">
              <div class="row align-items-center">
                <div class="col-lg-8">
                  <div class="text-uppercase small font-weight-bold text-sena mb-2" data-dashboard-area></div>
                  <h1 class="h3 mb-3 text-gray-800" data-dashboard-title></h1>
                  <p class="mb-0 text-gray-800" data-dashboard-text></p>
                </div>
                <div class="col-lg-4 text-lg-right mt-4 mt-lg-0">
                  <div class="small text-muted">Sesion activa</div>
                  <div class="font-weight-bold" data-session-email></div>
                </div>
              </div>
            </div>
          </div>
          <div class="row" id="metricCards"></div>
          <div class="row">
            <div class="col-lg-5 mb-4">
              <div class="card shadow h-100">
                <div class="card-header py-3 border-bottom-sena">
                  <h6 class="m-0 font-weight-bold text-sena">Ruta personal</h6>
                </div>
                <div class="card-body" id="taskList"></div>
              </div>
            </div>
            <div class="col-lg-7 mb-4">
              <div class="card shadow h-100">
                <div class="card-header py-3 border-bottom-sena">
                  <h6 class="m-0 font-weight-bold text-sena">Proximas entregas</h6>
                </div>
                <div class="card-body">
                  <div class="table-responsive">
                    <table class="table sena-table">
                      <thead>
                        <tr>
                          <th>Actividad</th>
                          <th>Fecha</th>
                          <th>Estado</th>
                        </tr>
                      </thead>
                      <tbody id="dashboardTableBody"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <footer class="sticky-footer bg-white">
        <div class="container my-auto">
          <div class="copyright text-center my-auto">
            <span>SENALearn LMS SENA - Aprendiz</span>
          </div>
        </div>
      </footer>

  <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
  <script src="js/sb-admin-2.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script>populateDashboard("Aprendiz");</script>
