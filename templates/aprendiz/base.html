<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>BARÍ LMS | {% block title %}Aprendiz{% endblock %}</title>
    <link href="{{ url_for('static', filename='vendor/fontawesome-free/css/all.min.css') }}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800,900" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/sb-admin-2.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/sena-learn.css') }}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    <style>
        .sidebar { background: linear-gradient(180deg, #1a7a3c 0%, #157a34 100%) !important; }
        .sidebar-brand { background: rgba(0,0,0,0.15) !important; }
        .sidebar .nav-item .nav-link { color: rgba(255,255,255,0.85) !important; }
        .sidebar .nav-item .nav-link:hover,
        .sidebar .nav-item.active .nav-link { color: #fff !important; background: rgba(255,255,255,0.15); border-radius: 6px; }
        .sidebar-divider { border-top: 1px solid rgba(255,255,255,0.2) !important; }
        .sidebar-heading { color: rgba(255,255,255,0.5) !important; }
        .logout-link { color: rgba(255,255,255,0.85) !important; background: none; border: none; text-align: left; padding: .75rem 1rem; width: 100%; }
        .logout-link:hover { color: white !important; background: rgba(255,255,255,0.15); border-radius: 6px; }
        .nav-active .nav-link { background: rgba(255,255,255,0.15) !important; border-radius: 6px; }
    </style>
</head>
<body id="page-top">
<div id="wrapper">

    <!-- Sidebar -->
    <ul class="navbar-nav sidebar sidebar-dark accordion" id="accordionSidebar">
        <a class="sidebar-brand d-flex align-items-center justify-content-center py-3" href="/dashboard/aprendiz">
            <div class="sidebar-brand-icon mr-2">
                <img src="{{ url_for('static', filename='img/logo-sena-blanco.png') }}" alt="SENA" style="width:36px;">
            </div>
            <div class="sidebar-brand-text font-weight-bold">BARÍ LMS</div>
        </a>
        <hr class="sidebar-divider my-0">

        <li class="nav-item">
            <a class="nav-link" href="/dashboard/aprendiz">
                <i class="fas fa-fw fa-home"></i>
                <span>Inicio</span>
            </a>
        </li>

        <hr class="sidebar-divider">
        <div class="sidebar-heading px-3 mb-1">Mi Formación</div>

        <li class="nav-item {% block menu_fichas %}{% endblock %}">
            <a class="nav-link" href="/aprendiz/fichas">
                <i class="fas fa-fw fa-id-card"></i>
                <span>Mis Fichas</span>
            </a>
        </li>
        <li class="nav-item {% block menu_fases %}{% endblock %}">
            <a class="nav-link" href="/aprendiz/fases">
                <i class="fas fa-fw fa-layer-group"></i>
                <span>Fases de Formación</span>
            </a>
        </li>

        <hr class="sidebar-divider">
        <li class="nav-item">
            <form method="post" action="/logout">
                <button type="submit" class="nav-link logout-link">
                    <i class="fas fa-fw fa-sign-out-alt"></i>
                    <span>Cerrar Sesión</span>
                </button>
            </form>
        </li>
    </ul>
    <!-- Fin Sidebar -->

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">
            <!-- Topbar -->
            <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow-sm">
                <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
                    <i class="fa fa-bars"></i>
                </button>
                <div class="ml-auto d-flex align-items-center">
                    <span class="mr-3 d-none d-lg-inline text-gray-600 small font-weight-bold">
                        {{ session['nombre'] }}
                    </span>
                    <div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center" style="width:38px;height:38px;font-weight:700;font-size:1rem;">
                        {{ session['nombre'][0] | upper }}
                    </div>
                </div>
            </nav>
            <!-- Fin Topbar -->

            <!-- Contenido de cada página -->
            {% block content %}{% endblock %}

        </div>

        <footer class="sticky-footer bg-white mt-auto">
            <div class="container my-auto">
                <div class="copyright text-center my-auto py-3">
                    <span class="text-muted small">BARÍ LMS &copy; SENA 2026</span>
                </div>
            </div>
        </footer>
    </div>
</div>

<script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/jquery-easing/jquery.easing.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/sb-admin-2.min.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
