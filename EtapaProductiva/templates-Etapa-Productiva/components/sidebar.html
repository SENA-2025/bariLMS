<ul class="navbar-nav bg-gradient-sena sidebar sidebar-dark accordion" id="accordionSidebar">

    <a class="sidebar-brand d-flex align-items-center justify-content-center"
       href="{{ url_for('dashboard', role_slug=user.dashboard_slug) }}">

        <div class="sidebar-brand-icon">
            <img src="{{ url_for('static', filename='img/logo-sena-blanco.png') }}"
                 class="sena-brand-logo">
        </div>

        <div class="sidebar-brand-text mx-3">BARÍ LMS</div>
    </a>

    <hr class="sidebar-divider my-0">

    <li class="nav-item active">
        <a class="nav-link" href="{{ url_for('dashboard', role_slug=user.dashboard_slug) }}">
            <i class="fas fa-fw fa-tachometer-alt"></i>
            <span>Panel principal</span>
        </a>
    </li>

    <hr class="sidebar-divider">

    <div class="sidebar-heading">{{ dashboard.menu_heading }}</div>

    {% for item in dashboard.menu %}
        <li class="nav-item">
            {% if item.endpoint_kwargs is defined %}
                <a class="nav-link" href="{{ url_for(item.endpoint, **item.endpoint_kwargs) }}">
            {% else %}
                <a class="nav-link" href="{{ url_for(item.endpoint) }}">
            {% endif %}
                <i class="fas fa-fw {{ item.icon }}"></i>
                <span>{{ item.label }}</span>
            </a>
        </li>
    {% endfor %}

    <li class="nav-item">
        <form method="post" action="{{ url_for('logout') }}">
            <button type="submit" class="nav-link btn btn-link w-100 text-left">
                <i class="fas fa-fw fa-sign-out-alt"></i>
                <span>Cerrar sesión</span>
            </button>
        </form>
    </li>

</ul>
